<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login – KnowYourMeds</title>
    <link rel="stylesheet" href="style.css">
</head>

<body data-page="login">

<header class="top-nav">
    <div class="logo">💊 KnowYourMeds</div>
</header>

<div class="form-card">
    <div class="form-title">Welcome back</div>
    <div class="form-sub">Log in to save history & manage your profile.</div>

    <label class="form-label">Email</label>
    <input id="loginEmail" class="form-input" type="email" placeholder="you@example.com">

    <label class="form-label">Password</label>
    <input id="loginPassword" class="form-input" type="password" placeholder="Your password">

    <button id="loginBtn" type="button" class="form-button">Login</button>

    <p id="loginMsg" class="msg"></p>

    <div class="form-footer">
        Don't have an account? <a href="signup.html">Sign up</a>
    </div>
</div>
<p id="footer" >&copy;2025 KnowYourMeds. All rights reserved.</p>

<script src="script.js"></script>
</body>
</html>
