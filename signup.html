<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up – KnowYourMeds</title>
    <link rel="stylesheet" href="style.css">
</head>

<body data-page="signup">

<header class="top-nav">
    <div class="logo">💊 KnowYourMeds</div>
</header>

<div class="form-card">
    <div class="form-title">Create an account</div>
    <div class="form-sub">Save your history and personalize your MedMix.</div>

    <label class="form-label">Full name</label>
    <input id="signupName" class="form-input" type="text" placeholder="Your name">

    <label class="form-label">Email</label>
    <input id="signupEmail" class="form-input" type="email" placeholder="you@example.com">

    <label class="form-label">Password</label>
    <input id="signupPassword" class="form-input" type="password" placeholder="Choose a password">

    <button id="signupBtn" type="button" class="form-button">Sign Up</button>

    <p id="signupMsg" class="msg"></p>

    <div class="form-footer">
        Already have an account? <a href="login.html">Log in</a>
    </div>
</div>
<p id="footer" >&copy;2025 KnowYourMeds. All rights reserved.</p>

<script src="script.js"></script>
</body>
</html>
